name: Deploy to Firebase Hosting & Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Type Check

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript Check
        run: npm run build -- --noEmit 2>/dev/null || tsc --noEmit

      - name: Check for lint issues (if eslint exists)
        run: npm list eslint >/dev/null 2>&1 && npm run lint || echo "eslint not configured"

  build-frontend:
    runs-on: ubuntu-latest
    name: Build Frontend
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  build-server:
    runs-on: ubuntu-latest
    name: Build Server Dependencies
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Upload server node_modules artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-node_modules
          path: server/node_modules/
          retention-days: 1

  deploy-frontend:
    needs: [build-frontend, lint]
    runs-on: ubuntu-latest
    name: Deploy Frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy Frontend and Firestore Rules to Firebase
        run: npx firebase-tools deploy --force --token ${{ secrets.FIREBASE_TOKEN }} --project eatappmain-e7503 --only hosting,firestore:rules,firestore:indexes

  deploy-server:
    needs: [build-server, lint]
    runs-on: ubuntu-latest
    name: Deploy Server
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download server node_modules artifact
        uses: actions/download-artifact@v4
        with:
          name: server-node_modules
          path: server/node_modules/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2.1.2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3.2.0

      - name: Configure Docker registry auth
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: server/
          push: true
          tags: us-central1-docker.pkg.dev/eatappmain-e7503/caloriesnap/caloriesnap-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy caloriesnap-api \
            --image us-central1-docker.pkg.dev/eatappmain-e7503/caloriesnap/caloriesnap-api:latest \
            --platform managed \
            --region us-central1 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 5 \
            --concurrency 80 \
            --set-env-vars ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
            --allow-unauthenticated \
            --project eatappmain-e7503

  health-check:
    needs: [deploy-frontend, deploy-server]
    runs-on: ubuntu-latest
    name: Verify Deployment Health
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Wait for deployment to be ready
        run: sleep 10

      - name: Check Frontend Health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://eatappmain-e7503.firebaseapp.com/)
          if [ "$response" != "200" ]; then
            echo "Frontend health check failed with status: $response"
            exit 1
          fi
          echo "✅ Frontend is healthy (HTTP $response)"

      - name: Check Server API Health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://caloriesnap-api-xyz123.run.app/ 2>/dev/null || echo "503")
          echo "Server health check response: $response"
          if [ "$response" = "404" ] || [ "$response" = "200" ]; then
            echo "✅ Server is responding"
          else
            echo "⚠️ Server may be starting up (status: $response)"
          fi
