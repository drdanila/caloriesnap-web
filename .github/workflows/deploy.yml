name: Deploy (PR → staging, main → prod)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pick the target environment from the trigger: push→main deploys prod,
# any PR deploys staging. The job's `environment:` selects which set of
# secrets/vars (production vs staging) gets injected.
concurrency:
  group: deploy-${{ github.event_name == 'push' && 'production' || format('staging-pr-{0}', github.event.pull_request.number) }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Type Check
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript Check
        run: npm run build -- --noEmit 2>/dev/null || tsc --noEmit
      - name: Check for lint issues (if eslint exists)
        run: npm list eslint >/dev/null 2>&1 && npm run lint || echo "eslint not configured"

  frontend-deploy:
    needs: [lint]
    runs-on: ubuntu-latest
    name: Deploy Frontend
    timeout-minutes: 15
    environment: ${{ github.event_name == 'push' && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build Frontend
        working-directory: web
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2.1.2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --force --project ${{ vars.FIREBASE_PROJECT }} --only hosting,firestore:rules,firestore:indexes,storage

  server-deploy:
    needs: [lint]
    runs-on: ubuntu-latest
    name: Deploy Server
    timeout-minutes: 20
    environment: ${{ github.event_name == 'push' && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2.1.2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3.2.0

      - name: Configure Docker registry auth
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: server/
          push: true
          tags: |
            us-central1-docker.pkg.dev/${{ vars.FIREBASE_PROJECT }}/caloriesnap/caloriesnap-api:latest
            us-central1-docker.pkg.dev/${{ vars.FIREBASE_PROJECT }}/caloriesnap/caloriesnap-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy caloriesnap-api \
            --image us-central1-docker.pkg.dev/${{ vars.FIREBASE_PROJECT }}/caloriesnap/caloriesnap-api:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 5 \
            --concurrency 80 \
            --set-env-vars ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},STORAGE_BUCKET=${{ vars.STORAGE_BUCKET }} \
            --allow-unauthenticated \
            --project ${{ vars.FIREBASE_PROJECT }}
