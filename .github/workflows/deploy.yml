name: Deploy to Firebase Hosting & Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Type Check
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript Check
        run: npm run build -- --noEmit 2>/dev/null || tsc --noEmit

      - name: Check for lint issues (if eslint exists)
        run: npm list eslint >/dev/null 2>&1 && npm run lint || echo "eslint not configured"

  frontend-deploy:
    needs: [lint]
    runs-on: ubuntu-latest
    name: Deploy Frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2.1.2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --force --project eatappmain-e7503 --only hosting,firestore:rules,firestore:indexes

  server-deploy:
    needs: [lint]
    runs-on: ubuntu-latest
    name: Deploy Server
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    outputs:
      server_url: ${{ steps.deploy.outputs.server_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2.1.2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3.2.0

      - name: Configure Docker registry auth
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: server/
          push: true
          tags: |
            us-central1-docker.pkg.dev/eatappmain-e7503/caloriesnap/caloriesnap-api:latest
            us-central1-docker.pkg.dev/eatappmain-e7503/caloriesnap/caloriesnap-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          SERVICE_URL=$(gcloud run deploy caloriesnap-api \
            --image us-central1-docker.pkg.dev/eatappmain-e7503/caloriesnap/caloriesnap-api:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 5 \
            --concurrency 80 \
            --set-env-vars ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
            --allow-unauthenticated \
            --project eatappmain-e7503 \
            --format='value(status.url)')
          echo "server_url=${SERVICE_URL}" >> $GITHUB_OUTPUT

  health-check:
    needs: [frontend-deploy, server-deploy]
    runs-on: ubuntu-latest
    name: Verify Deployment Health
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 5

    steps:
      - name: Check Frontend Health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://eatappmain-e7503.firebaseapp.com/)
          if [ "$response" != "200" ]; then
            echo "Frontend health check failed with status: $response"
            exit 1
          fi
          echo "✅ Frontend is healthy (HTTP $response)"

      - name: Check Server API Health
        env:
          SERVER_URL: ${{ needs.server-deploy.outputs.server_url }}
        run: |
          if [ -z "$SERVER_URL" ]; then
            echo "⚠️ No server URL captured, skipping server health check"
            exit 0
          fi
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${SERVER_URL}/" 2>/dev/null || echo "000")
          echo "Server health check response: $response"
          if [ "$response" = "200" ] || [ "$response" = "404" ]; then
            echo "✅ Server is responding at ${SERVER_URL}"
          else
            echo "❌ Server health check failed with status: $response"
            exit 1
          fi
